<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solitaire: Visual People Database</title>
  <link rel="stylesheet" href="./css/solitaire-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/solitaire.svg">
</head>
<body>
<div id="side-overlay" tabindex="-1"></div>

<aside id="side-drawer" aria-hidden="true" aria-labelledby="side-title" role="dialog">
  <header class="drawer-header">
    <h1>♤ Solitaire: Visual People Database</h1>
    <button id="side-close" aria-label="Close">×</button>
  </header>

  <nav class="content">
    <ul class="actions">
      <li><button id="act-about">ℹ️ About</button></li>
      <li><button id="act-upload">📤 Upload CSV</button></li>
        <label class="switch-label">
          🎨 Legenda by Role
          <input type="radio" id="toggle-color-role" checked>
          <span class="slider"></span>
        </label>
      </li>
      <li>
        <label class="switch-label">
          🏢 Legenda by Company
          <input type="radio" id="toggle-color-company">
          <span class="slider"></span>
        </label>
      </li>
      <li>
        <label class="switch-label">
          📍 Legenda by Location
          <input type="radio" id="toggle-color-location">
          <span class="slider"></span>
        </label>
      </li>
      <li>
      <li class="scenario-actions">
        <div class="scenario-row">
          <button id="act-save" type="button">💾 Save</button>
          <button id="act-reset-layout" type="button">❌ Reset</button>
        </div>
        <div class="scenario-row">
          <button id="act-export-scenario" type="button">📋 Export</button>
          <button id="act-import-scenario" type="button">📥 Import</button>
        </div>
      </li>

      <li><button id="act-report">📝 Report a change</button></li>
      <li><button id="act-switch" onclick="window.location.href='./domino.html'">⚅ Domino</button></li>
    </ul>
  </nav>

  <footer class="drawer-footer">
    <small id="side-last-update"></small>
  </footer>
</aside>

<div class="top-bar">
  <span id="toggle-cta" class="toggle-icon"><button>☰</button></span>
  <div class="top-search">
    <input type="text" id="drawer-search-input" placeholder="Search for a person, group, service or role..." />
    <button id="drawer-search-go">🔎</button>
    <button id="act-clear">❌</button>
  </div>
</div>

<label for="fileInput" id="label-file" class="custom-file-upload">
  <input type="file" id="fileInput" accept=".csv" class="file-input" />
  Upload a CSV People DB
</label>
<div id="output"></div>
<svg id="canvas"></svg>

<div id="drawer-overlay"></div>

<aside id="drawer" aria-hidden="true" aria-labelledby="drawer-title" role="dialog">
  <header>
    <h3 id="drawer-title">Managed Services</h3>
    <button id="drawer-close" aria-label="Close">×</button>
  </header>
  <div class="content">
    <p id="drawer-description" class="drawer-description"></p>
    <ul id="drawer-list"></ul>
  </div>
</aside>

</body>
</html>
