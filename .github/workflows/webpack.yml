name: NodeJS with Webpack

permissions:
  contents: read
  pages: write
  id-token: write

on:
  workflow_run:
    workflows: ["Update Service Catalog CSV"]
    types:
      - completed

  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    # ✅ Parte su push OPPURE dopo Update CSV riuscita
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    # ✅ OBBLIGATORIO per deploy-pages
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify dist directory
        run: |
          echo "Contents of dist directory:"
          ls -la dist

      - name: Disable Jekyll
        run: echo "" > dist/.nojekyll

      # ✅ STEP 1 — prepara artifact Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # ✅ STEP 2 — crea deployment Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4